package:
  create:
    set:
      pkg_version: upstream

      agent_image_domain: "ghcr.io/"
      agent_image: zarf-dev/zarf/agent
      # renovate: datasource=docker depName=ghcr.io/zarf-dev/zarf/agent
      agent_image_tag: v0.80.0

      registry_image_domain: ""
      registry_image: library/registry
      # renovate: datasource=docker depName=library/registry
      registry_image_tag: 3.1.1

      proxy_image_domain: ""
      proxy_image: alpine/socat
      # renovate: datasource=docker depName=alpine/socat
      proxy_image_tag: 1.8.1.3

      # renovate: datasource=docker depName=ghcr.io/go-gitea/gitea
      gitea_image: "ghcr.io/go-gitea/gitea:1.26.4-rootless"
